global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: "critical"
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: "warning"
      repeat_interval: 4h

receivers:
  - name: "default"
    # Configure webhook, Slack, or email for production:
    # webhook_configs:
    #   - url: "${ALERTMANAGER_WEBHOOK_URL}"
    #     send_resolved: true

  - name: "critical"
    # webhook_configs:
    #   - url: "${ALERTMANAGER_CRITICAL_WEBHOOK_URL}"
    #     send_resolved: true

  - name: "warning"
    # webhook_configs:
    #   - url: "${ALERTMANAGER_WARNING_WEBHOOK_URL}"
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
