name: ai-demo CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn -B -ntp test

      - name: Run verify
        run: mvn -B -ntp verify -DskipITs=true

      - name: Run regression script
        run: python3 scripts/run_regression.py --dataset evaluation/dataset.json --report-dir reports/regression
